<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>生日快乐 🎂</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- SCREEN 1: Photo Stack -->
  <div id="screen-photos" class="screen active">
    <div class="screen-bg"></div>
    <!-- <p class="hint-text">轻触照片开始 ✨</p> -->
    <div id="photo-stack"></div>
  </div>

  <!-- SCREEN 2: Birthday Message + Gift -->
  <div id="screen-message" class="screen">
    <div class="screen-bg"></div>
    <div class="message-content">
      <p class="birthday-text">宝贝生日快乐!</p>
      <p class="birthday-sub">打开看看吧~：</p>
      <button id="gift-btn" class="gift-btn" aria-label="打开礼物">🎁</button>
    </div>
  </div>

  <!-- MODAL: Passphrase -->
  <div id="modal-passphrase" class="modal hidden">
    <div class="modal-card">
      <p class="modal-clue">密码：“宝贝能不能给我一个头皮的 ___”</p>
      <input id="passphrase-input" type="text" placeholder="答案..." autocomplete="off" />
      <p id="passphrase-error" class="passphrase-error hidden">你是不是AI？</p>
      <button id="passphrase-submit" class="btn-primary">确认</button>
    </div>
  </div>

  <!-- SCREEN 3: Gift Card -->
  <div id="screen-gift" class="screen">
    <div class="screen-bg"></div>
    <div class="gift-card">
      <div class="gift-card-header">
        <img src="assets/photos/gift.png" class="gift-card-img" alt="" />
        <h2 class="gift-card-title">顶级头皮SPA来袭</h2>
      </div>
      <div class="gift-card-body">
        <div class="gift-row">
          <span class="gift-label">金额</span>
          <span class="gift-value gift-amount">$317</span>
        </div>
        <div class="gift-row">
          <span class="gift-label">礼品码</span>
          <span class="gift-value gift-code">1R5K*****G71E</span>
        </div>
        <div class="gift-row gift-row-address">
          <span class="gift-label">地址</span>
          <span class="gift-value gift-address">10475 Medlock Bridge Rd, STE 105, Johns Creek, GA 30097</span>
        </div>
      </div>
      <p class="gift-card-footer">爱你宝贝！Enjoy~ 💗</p>
    </div>
  </div>

  <!-- Note Overlay (shown on first tap) -->
  <div id="note-overlay" class="note-overlay hidden">
    <div class="note-card">
      <p id="note-text" class="note-text"></p>
      <p class="note-hint">轻触屏幕继续</p>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
